<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RepReady — Log Workout</title>
<style>
  :root { color-scheme: light dark; --bg:#0f1115; --card:#181b22; --line:#272b35;
          --txt:#e8eaf0; --mut:#9aa3b2; --accent:#4ade80; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--txt); padding:16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; max-width:520px; }
  .head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px; }
  .head h1 { font-size:17px; margin:0; }
  .tab { color:var(--mut); font-size:12px; }
  dl { display:grid; grid-template-columns:120px 1fr; gap:6px 12px; margin:0; }
  dt { color:var(--mut); font-size:12px; }
  dd { margin:0; font-size:13px; word-break:break-word; }
  .json { background:#11141a; border:1px solid var(--line); border-radius:8px; padding:8px; font:12px/1.4 ui-monospace,Menlo,monospace; color:#cbd5e1; white-space:pre-wrap; }
  .confirm { margin-top:14px; padding:10px 12px; background:#0c3b2a; border:1px solid #155e44; border-radius:10px; color:#a7f3d0; font-size:13px; }
</style>
</head>
<body>
<div id="root" style="color:#9aa3b2">Preparing log entry…</div>
<script>
(function(){
  var esc = function(x){ return String(x==null?"":x).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];}); };
  var label = function(s){ return esc(String(s).replace(/_/g," ").replace(/\b\w/g,function(c){return c.toUpperCase();})); };
  var prettyDetails = function(s){ try { return JSON.stringify(JSON.parse(s), null, 1); } catch(e){ return s || "{}"; } };

  function render(d){
    var r = d.row || {};
    var root = document.getElementById("root");
    root.style.color = "";
    root.innerHTML =
      '<div class="card"><div class="head"><h1>' + esc(d.title || "Workout ready to log") + '</h1>' +
        '<span class="tab">→ ' + esc(d.sheet_tab || "WorkoutHistory") + '</span></div>' +
      '<dl>' +
        '<dt>Date</dt><dd>' + esc(r.date) + '</dd>' +
        '<dt>Type</dt><dd>' + label(r.session_type) + '</dd>' +
        '<dt>Title</dt><dd>' + esc(r.title) + '</dd>' +
        '<dt>Duration</dt><dd>' + esc(r.duration_min) + ' min' + (r.distance_km ? ' · ' + esc(r.distance_km) + ' km' : '') + '</dd>' +
        '<dt>RPE</dt><dd>' + esc(r.avg_rpe || "—") + '</dd>' +
        '<dt>Pain flags</dt><dd>' + esc(r.pain_flags || "[]") + '</dd>' +
        '<dt>Log ID</dt><dd>' + esc(r.log_id) + '</dd>' +
      '</dl>' +
      '<dt style="color:#9aa3b2;font-size:12px;margin:12px 0 4px">Details</dt>' +
      '<div class="json">' + esc(prettyDetails(r.details)) + '</div>' +
      '<div class="confirm">' + esc(d.confirm || "Append this row to the sheet?") + '</div></div>';
  }

  try { render(window.__REPREADY_DATA__ || {}); }
  catch (e) { document.getElementById("root").textContent = "Could not render log card: " + e.message; }
})();
</script>
</body>
</html>
