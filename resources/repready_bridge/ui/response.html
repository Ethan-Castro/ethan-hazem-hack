<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RepReady — Coach</title>
<style>
  :root { color-scheme: light dark; --bg:#0f1115; --card:#181b22; --line:#272b35;
          --txt:#e8eaf0; --mut:#9aa3b2; --accent:#4ade80; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.6 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--txt); padding:16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; max-width:680px; }
  .head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .brand { display:flex; align-items:center; gap:8px; font-weight:700; font-size:15px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent); }
  .src { color:var(--mut); font-size:11px; }
  .body h1,.body h2,.body h3 { font-size:14px; margin:14px 0 6px; color:#fff; }
  .body h2 { font-size:15px; } .body h1 { font-size:16px; }
  .body p { margin:8px 0; } .body ul { margin:6px 0 6px 2px; padding-left:18px; }
  .body li { margin:3px 0; } .body strong { color:#fff; }
  .body code { background:#11141a; border:1px solid var(--line); border-radius:5px; padding:1px 5px; font-size:12px; }
  .uid { margin-top:14px; color:var(--mut); font-size:11px; border-top:1px solid var(--line); padding-top:8px; }
</style>
</head>
<body>
<div id="root" style="color:#9aa3b2">Coaching…</div>
<script>
(function(){
  var esc = function(x){ return String(x==null?"":x).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];}); };
  function inline(s){
    return esc(s)
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/`([^`]+)`/g, "<code>$1</code>");
  }
  function md(text){
    var lines = String(text||"").split(/\r?\n/), out = [], inList = false;
    function closeList(){ if(inList){ out.push("</ul>"); inList=false; } }
    for (var i=0;i<lines.length;i++){
      var ln = lines[i];
      var h = ln.match(/^(#{1,3})\s+(.*)$/);
      var li = ln.match(/^\s*[-*]\s+(.*)$/);
      if (h){ closeList(); out.push("<h"+h[1].length+">"+inline(h[2])+"</h"+h[1].length+">"); }
      else if (li){ if(!inList){ out.push("<ul>"); inList=true; } out.push("<li>"+inline(li[1])+"</li>"); }
      else if (ln.trim()===""){ closeList(); }
      else { closeList(); out.push("<p>"+inline(ln)+"</p>"); }
    }
    closeList();
    return out.join("");
  }
  function render(d){
    var root = document.getElementById("root");
    root.style.color = "";
    root.innerHTML =
      '<div class="card"><div class="head"><div class="brand"><span class="dot"></span> RepReady</div>' +
        '<span class="src">' + esc(d.source || "GraphN workflow") + '</span></div>' +
      '<div class="body">' + md(d.response) + '</div>' +
      (d.active_user_id ? '<div class="uid">athlete: ' + esc(d.active_user_id) + '</div>' : '') +
      '</div>';
  }
  try { render(window.__REPREADY_DATA__ || {response:"(no data)"}); }
  catch (e) { document.getElementById("root").textContent = "Could not render: " + e.message; }
})();
</script>
</body>
</html>
